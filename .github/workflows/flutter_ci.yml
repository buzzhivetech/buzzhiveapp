name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Create .env for asset bundle
        run: |
          if [ ! -f .env ]; then
            echo "SUPABASE_URL=" > .env
            echo "SUPABASE_ANON_KEY=" >> .env
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for asset bundle
        run: |
          cp .env.example .env 2>/dev/null || true
          if [ ! -f .env ]; then
            echo "SUPABASE_URL=" > .env
            echo "SUPABASE_ANON_KEY=" >> .env
          fi

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --release
