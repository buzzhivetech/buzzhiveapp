name: buzzhive_app
description: BuzzHive iOS app - Supabase auth, Firebase sensor data, dashboard parity.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.0
  flutter_riverpod: ^2.4.9
  go_router: ^14.1.3
  supabase_flutter: ^2.3.4
  firebase_core: ^3.6.0
  firebase_database: ^11.1.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.19.0
  equatable: ^2.0.5
  flutter_reactive_ble: ^5.4.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
